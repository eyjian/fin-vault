# FinVault（锦仓）接口契约定义
# 
# 本文档定义系统各层之间的接口契约，确保模块解耦和升级最小改动。
# 基于 architecture-design.md v2.2 和 domain-model.md v1.0

version: "1.0"
created_at: "2026-05-17"
status: "draft"

# ==============
# 1. Repository 接口（存储层抽象）
# ==============
repository:
  description: "存储层抽象接口，定义在 repository/interfaces.go，GORM 实现在 repository/gorm/"
  
  base_repository:
    name: "BaseRepository[T]"
    description: "通用 CRUD 接口，各领域 Repository 嵌入此接口"
    methods:
      - name: "Create"
        signature: "Create(ctx context.Context, entity *T) error"
        description: "创建实体"
        
      - name: "GetByID"
        signature: "GetByID(ctx context.Context, id uint) (*T, error)"
        description: "按 ID 查询实体"
        
      - name: "Update"
        signature: "Update(ctx context.Context, entity *T) error"
        description: "更新实体"
        
      - name: "Delete"
        signature: "Delete(ctx context.Context, id uint) error"
        description: "删除实体（软删）"
        
      - name: "List"
        signature: "List(ctx context.Context, opts ListOptions) ([]T, int64, error)"
        description: "分页查询列表"

  AssetRepository:
    name: "AssetRepository"
    description: "资产仓储接口"
    methods:
      - name: "Create"
        signature: "Create(ctx context.Context, asset *domain.Asset) error"
      - name: "GetByID"
        signature: "GetByID(ctx context.Context, id uint) (*domain.Asset, error)"
      - name: "GetByCode"
        signature: "GetByCode(ctx context.Context, userID uint, code string) (*domain.Asset, error)"
      - name: "ListByUser"
        signature: "ListByUser(ctx context.Context, userID uint, opt ListOption) ([]*domain.Asset, int64, error)"
      - name: "Update"
        signature: "Update(ctx context.Context, asset *domain.Asset) error"
      - name: "Delete"
        signature: "Delete(ctx context.Context, id uint) error"
      - name: "ExistsByCode"
        signature: "ExistsByCode(ctx context.Context, code string) (bool, error)"

  HoldingRepository:
    name: "HoldingRepository"
    description: "持仓仓储接口"
    methods:
      - name: "Create"
        signature: "Create(ctx context.Context, holding *domain.Holding) error"
      - name: "GetByID"
        signature: "GetByID(ctx context.Context, id uint) (*domain.Holding, error)"
      - name: "GetByUserAssetPlatform"
        signature: "GetByUserAssetPlatform(ctx context.Context, userID, assetID, platformID uint) (*domain.Holding, error)"
      - name: "ListByUser"
        signature: "ListByUser(ctx context.Context, userID uint, opt ListOption) ([]*domain.Holding, int64, error)"
      - name: "ListByPlatform"
        signature: "ListByPlatform(ctx context.Context, platform string) ([]domain.Holding, error)"
      - name: "ListByType"
        signature: "ListByType(ctx context.Context, assetType domain.AssetType) ([]domain.Holding, error)"
      - name: "Update"
        signature: "Update(ctx context.Context, holding *domain.Holding) error"
      - name: "GetSummary"
        signature: "GetSummary(ctx context.Context) (*HoldingSummary, error)"
      - name: "UpdateQuantityAndCost"
        signature: "UpdateQuantityAndCost(ctx context.Context, id uint, quantity, totalCost decimal.Decimal) error"

  TransactionRepository:
    name: "TransactionRepository"
    description: "交易记录仓储接口"
    methods:
      - name: "Create"
        signature: "Create(ctx context.Context, txn *domain.Transaction) error"
      - name: "GetByID"
        signature: "GetByID(ctx context.Context, id uint) (*domain.Transaction, error)"
      - name: "ListByHolding"
        signature: "ListByHolding(ctx context.Context, holdingID uint) ([]domain.Transaction, error)"
      - name: "ListByDateRange"
        signature: "ListByDateRange(ctx context.Context, start, end time.Time) ([]domain.Transaction, error)"
      - name: "ListByUser"
        signature: "ListByUser(ctx context.Context, userID uint, opt ListOption) ([]*domain.Transaction, int64, error)"
      - name: "GetByExternalID"
        signature: "GetByExternalID(ctx context.Context, platformID uint, externalID string) (*domain.Transaction, error)"

  PriceQuoteRepository:
    name: "PriceQuoteRepository"
    description: "行情快照仓储接口"
    methods:
      - name: "Create"
        signature: "Create(ctx context.Context, quote *domain.PriceQuote) error"
      - name: "GetLatestByAsset"
        signature: "GetLatestByAsset(ctx context.Context, assetID uint) (*domain.PriceQuote, error)"
      - name: "ListByAssetAndDateRange"
        signature: "ListByAssetAndDateRange(ctx context.Context, assetID uint, start, end time.Time) ([]domain.PriceQuote, error)"

  ExchangeRateRepository:
    name: "ExchangeRateRepository"
    description: "汇率快照仓储接口"
    methods:
      - name: "Create"
        signature: "Create(ctx context.Context, rate *domain.ExchangeRate) error"
      - name: "GetLatest"
        signature: "GetLatest(ctx context.Context, from, to string, date time.Time) (*domain.ExchangeRate, error)"
      - name: "ListByDateRange"
        signature: "ListByDateRange(ctx context.Context, from, to string, start, end time.Time) ([]domain.ExchangeRate, error)"

# ==============
# 2. CacheProvider 接口（缓存层抽象）
# ==============
cache:
  description: "缓存层抽象接口，定义在 cache/interfaces.go"
  
  CacheProvider:
    name: "CacheProvider"
    description: "缓存提供者接口，本地阶段用 sync.Map + TTL，生产阶段用 Redis"
    methods:
      - name: "Get"
        signature: "Get(ctx context.Context, key string) (string, error)"
        description: "获取缓存值，不存在返回 error"
        
      - name: "Set"
        signature: "Set(ctx context.Context, key string, value string, ttl time.Duration) error"
        description: "设置缓存值，ttl=0 表示永不过期"
        
      - name: "Delete"
        signature: "Delete(ctx context.Context, key string) error"
        description: "删除缓存"
        
      - name: "Exists"
        signature: "Exists(ctx context.Context, key string) (bool, error)"
        description: "检查缓存是否存在"

# ==============
# 3. Agent Runner 接口（AI 运行时抽象）
# ==============
agent:
  description: "AI Agent 运行时接口，定义在 internal/llm/agent/runner.go"
  
  ToolCall:
    name: "ToolCall"
    type: "struct"
    fields:
      - name: "Name"
        type: "string"
        description: "工具名称"
      - name: "Arguments"
        type: "map[string]interface{}"
        description: "工具参数"
      - name: "StartedAt"
        type: "time.Time"
        description: "开始时间"
      - name: "FinishedAt"
        type: "time.Time"
        description: "结束时间"
      - name: "Status"
        type: "string"
        description: "状态：success / failed / timeout"
      - name: "ErrorMessage"
        type: "string"
        description: "错误信息"

  TokenUsage:
    name: "TokenUsage"
    type: "struct"
    fields:
      - name: "PromptTokens"
        type: "int"
        description: "提示词 token 数"
      - name: "CompletionTokens"
        type: "int"
        description: "生成 token 数"
      - name: "TotalTokens"
        type: "int"
        description: "总 token 数"

  Runner:
    name: "Runner"
    description: "业务侧 Agent 运行时接口，定义在 internal/llm/agent/runner.go"
    methods:
      - name: "Run"
        signature: "Run(ctx context.Context, sessionID string, userMessage string) (assistantMessage string, toolCalls []ToolCall, tokenUsage TokenUsage, err error)"
        description: "执行一次 Agent 对话轮次"

# ==============
# 4. SessionStore 接口（会话持久化层抽象）
# ==============
session:
  description: "AI 会话持久化层接口，定义在 internal/llm/session/store.go"
  
  ListSessionsOptions:
    name: "ListSessionsOptions"
    type: "struct"
    fields:
      - name: "UserID"
        type: "uint"
        description: "用户 ID 过滤"
      - name: "Limit"
        type: "int"
        description: "返回数量限制"
      - name: "Offset"
        type: "int"
        description: "偏移量"

  SessionStore:
    name: "SessionStore"
    description: "会话持久化接口"
    methods:
      - name: "CreateSession"
        signature: "CreateSession(ctx context.Context, s *domain.Session) error"
        description: "创建会话"
        
      - name: "GetSession"
        signature: "GetSession(ctx context.Context, sessionID string) (*domain.Session, error)"
        description: "获取会话"
        
      - name: "UpdateSession"
        signature: "UpdateSession(ctx context.Context, s *domain.Session) error"
        description: "更新会话"
        
      - name: "DeleteSession"
        signature: "DeleteSession(ctx context.Context, sessionID string) error"
        description: "删除会话"
        
      - name: "ListSessions"
        signature: "ListSessions(ctx context.Context, opts ListSessionsOptions) ([]domain.Session, int64, error)"
        description: "列出会话"
        
      - name: "ListMessages"
        signature: "ListMessages(ctx context.Context, sessionID string, limit int) ([]domain.Message, error)"
        description: "按 created_at 升序拉取最近 N 条消息"
        
      - name: "AppendMessage"
        signature: "AppendMessage(ctx context.Context, m *domain.Message) error"
        description: "追加消息"
        
      - name: "AppendStep"
        signature: "AppendStep(ctx context.Context, step *domain.AgentStep) error"
        description: "追加步骤事件（仅追加从不更新；写入前 mask 敏感字段）"
        
      - name: "EstimateStepsSize"
        signature: "EstimateStepsSize(ctx context.Context) (int64, error)"
        description: "估算 t_fv_ai_agent_steps 表占用空间（字节），用于 max_steps_size_mb 滚动清理"

# ==============
# 5. EventBus 接口（事件层抽象，预留）
# ==============
event:
  description: "事件总线接口，定义在 event/interfaces.go，本地阶段用 Go channel，分布式阶段用 NATS/Kafka"
  
  Event:
    name: "Event"
    type: "struct"
    fields:
      - name: "Topic"
        type: "string"
        description: "事件主题"
      - name: "Payload"
        type: "any"
        description: "事件载荷"

  EventHandler:
    name: "EventHandler"
    type: "func(ctx context.Context, event Event) error"
    description: "事件处理函数"

  EventPublisher:
    name: "EventPublisher"
    description: "事件发布接口"
    methods:
      - name: "Publish"
        signature: "Publish(ctx context.Context, event Event) error"
        description: "发布事件"

  EventSubscriber:
    name: "EventSubscriber"
    description: "事件订阅接口"
    methods:
      - name: "Subscribe"
        signature: "Subscribe(topic string, handler EventHandler) error"
        description: "订阅事件"

  EventBus:
    name: "EventBus"
    description: "事件总线组合接口（EventPublisher + EventSubscriber）"
    methods:
      - name: "(all methods from EventPublisher)"
      - name: "(all methods from EventSubscriber)"

# ==============
# 6. IDGenerator 接口（ID 生成抽象）
# ==============
id:
  description: "ID 生成抽象接口，定义在 internal/id/generator.go"
  
  IDGenerator:
    name: "IDGenerator"
    description: "ID 生成器接口"
    methods:
      - name: "NextID"
        signature: "NextID() string"
        description: "生成字符串型 ID（UUID v7 / Snowflake 字符串）"
        
      - name: "NextInt64"
        signature: "NextInt64() int64"
        description: "生成数字型 ID（仅 Snowflake 实现支持，UUID 实现可返回错误）"

# ==============
# 7. Migrator 接口（数据库迁移抽象）
# ==============
database:
  description: "数据库迁移抽象接口，定义在 internal/database/migrator.go"
  
  Migrator:
    name: "Migrator"
    description: "数据库迁移接口"
    methods:
      - name: "Up"
        signature: "Up(ctx context.Context) error"
        description: "执行迁移（全部或指定步数）"
        
      - name: "Down"
        signature: "Down(ctx context.Context, steps int) error"
        description: "回滚迁移（指定步数）"
        
      - name: "Version"
        signature: "Version(ctx context.Context) (uint, bool, error)"
        description: "获取当前版本（版本号，是否为脏状态）"

# ==============
# 8. ReportExporter 接口（报表导出抽象）
# ==============
report:
  description: "报表导出抽象接口，定义在 internal/report/exporter.go"
  
  ReportFormat:
    name: "ReportFormat"
    type: "string"
    values:
      - name: "FormatExcel"
        value: "xlsx"
        description: "Excel 格式"
      - name: "FormatMarkdown"
        value: "md"
        description: "Markdown 格式"
      - name: "FormatPDF"
        value: "pdf"
        description: "PDF 格式（第一阶段不实现）"

  ReportExporter:
    name: "ReportExporter"
    description: "报表导出器接口"
    methods:
      - name: "Format"
        signature: "Format() ReportFormat"
        description: "返回导出格式"
        
      - name: "Export"
        signature: "Export(ctx context.Context, report *domain.Report, w io.Writer) error"
        description: "导出报表到 Writer"

# ==============
# 9. Service 层接口（业务逻辑层）
# ==============
service:
  description: "Service 层接口定义，业务逻辑编排"
  
  AssetService:
    name: "AssetService"
    description: "资产管理服务接口"
    methods:
      - name: "Create"
        signature: "Create(ctx context.Context, input CreateAssetInput) (*domain.Asset, error)"
      - name: "GetByID"
        signature: "GetByID(ctx context.Context, id uint) (*domain.Asset, error)"
      - name: "List"
        signature: "List(ctx context.Context, opts ListOptions) ([]*domain.Asset, int64, error)"
        description: "列出资产，支持可选参数 include_holdings 控制是否返回持仓和盈亏数据"
      - name: "Update"
        signature: "Update(ctx context.Context, id uint, input UpdateAssetInput) (*domain.Asset, error)"
      - name: "Delete"
        signature: "Delete(ctx context.Context, id uint) error"
    types:
      - name: "ListOptions"
        type: "struct"
        description: "资产列表查询选项"
        fields:
          - name: "IncludeHoldings"
            type: "bool"
            description: "是否包含持仓和盈亏数据（可选，默认 false）"
          - name: "AssetType"
            type: "string"
            description: "资产类型过滤（可选）"
          - name: "PlatformID"
            type: "uint"
            description: "平台 ID 过滤（可选）"
          - name: "UserID"
            type: "uint"
            description: "用户 ID（可选，多用户阶段使用）"
          - name: "Page"
            type: "int"
            description: "页码（从 1 开始）"
          - name: "PageSize"
            type: "int"
            description: "每页数量"

  HoldingService:
    name: "HoldingService"
    description: "持仓管理服务接口"
    methods:
      - name: "GetByID"
        signature: "GetByID(ctx context.Context, id uint) (*domain.Holding, error)"
      - name: "List"
        signature: "List(ctx context.Context, opts ListOptions) ([]*HoldingView, int64, error)"
      - name: "GetSummary"
        signature: "GetSummary(ctx context.Context, displayCurrency string) (*HoldingSummaryView, error)"
      - name: "Recalculate"
        signature: "Recalculate(ctx context.Context, holdingID uint) error"

  TransactionService:
    name: "TransactionService"
    description: "交易记录服务接口"
    methods:
      - name: "Create"
        signature: "Create(ctx context.Context, input CreateTransactionInput) (*domain.Transaction, error)"
      - name: "GetByID"
        signature: "GetByID(ctx context.Context, id uint) (*domain.Transaction, error)"
      - name: "List"
        signature: "List(ctx context.Context, opts ListOptions) ([]*domain.Transaction, int64, error)"
      - name: "Delete"
        signature: "Delete(ctx context.Context, id uint) error"
      - name: "ImportCSV"
        signature: "ImportCSV(ctx context.Context, reader io.Reader) (int, error)"

  AISessionService:
    name: "AISessionService"
    description: "AI 会话管理服务接口"
    methods:
      - name: "Create"
        signature: "Create(ctx context.Context, userID uint, title string) (*domain.Session, error)"
      - name: "GetByID"
        signature: "GetByID(ctx context.Context, userID uint, sessionID string) (*domain.Session, error)"
      - name: "List"
        signature: "List(ctx context.Context, userID uint, opts ListOptions) ([]*domain.Session, int64, error)"
      - name: "Delete"
        signature: "Delete(ctx context.Context, userID uint, sessionID string) error"

  AIMessageService:
    name: "AIMessageService"
    description: "AI 消息管理服务接口"
    methods:
      - name: "Send"
        signature: "Send(ctx context.Context, userID uint, sessionID, userMsg string) (*SendResult, error)"
        description: "发送用户消息并获取 AI 回复（调用 Runner.Run）"
      - name: "List"
        signature: "List(ctx context.Context, sessionID string, limit int) ([]domain.Message, error)"
        description: "列出会话消息"

# ==============
# 10. Handler 层接口（HTTP 处理层）
# ==============
handler:
  description: "Handler 层接口定义，HTTP 请求处理"
  
  AssetHandler:
    name: "AssetHandler"
    description: "资产管理 Handler"
    methods:
      - name: "Create"
        signature: "Create(c *gin.Context)"
        http: "POST /api/v1/assets"
      - name: "Get"
        signature: "Get(c *gin.Context)"
        http: "GET /api/v1/assets/:id"
      - name: "List"
        signature: "List(c *gin.Context)"
        http: "GET /api/v1/assets"
        description: "支持可选查询参数 include_holdings=true 返回持仓和盈亏数据"
      - name: "Update"
        signature: "Update(c *gin.Context)"
        http: "PUT /api/v1/assets/:id"
      - name: "Delete"
        signature: "Delete(c *gin.Context)"
        http: "DELETE /api/v1/assets/:id"

  HoldingHandler:
    name: "HoldingHandler"
    description: "持仓管理 Handler"
    methods:
      - name: "List"
        signature: "List(c *gin.Context)"
        http: "GET /api/v1/holdings"
      - name: "GetSummary"
        signature: "GetSummary(c *gin.Context)"
        http: "GET /api/v1/holdings/summary"

  TransactionHandler:
    name: "TransactionHandler"
    description: "交易记录 Handler"
    methods:
      - name: "Create"
        signature: "Create(c *gin.Context)"
        http: "POST /api/v1/transactions"
      - name: "List"
        signature: "List(c *gin.Context)"
        http: "GET /api/v1/transactions"
      - name: "ImportCSV"
        signature: "ImportCSV(c *gin.Context)"
        http: "POST /api/v1/transactions/import"

  AISessionHandler:
    name: "AISessionHandler"
    description: "AI 会话 Handler"
    methods:
      - name: "Create"
        signature: "Create(c *gin.Context)"
        http: "POST /api/v1/ai/sessions"
      - name: "List"
        signature: "List(c *gin.Context)"
        http: "GET /api/v1/ai/sessions"
      - name: "Get"
        signature: "Get(c *gin.Context)"
        http: "GET /api/v1/ai/sessions/:id"
      - name: "Delete"
        signature: "Delete(c *gin.Context)"
        http: "DELETE /api/v1/ai/sessions/:id"

  AIMessageHandler:
    name: "AIMessageHandler"
    description: "AI 消息 Handler"
    methods:
      - name: "Send"
        signature: "Send(c *gin.Context)"
        http: "POST /api/v1/ai/sessions/:id/messages"
      - name: "List"
        signature: "List(c *gin.Context)"
        http: "GET /api/v1/ai/sessions/:id/messages"

  AIMetaHandler:
    name: "AIMetaHandler"
    description: "AI 元信息 Handler（Provider 列表）"
    methods:
      - name: "GetProviders"
        signature: "GetProviders(c *gin.Context)"
        http: "GET /api/v1/ai/providers"

# ==============
# 11. AI 工具接口（Tool 定义）
# ==============
tools:
  description: "AI 工具定义，每个 Tool 一个文件，入参定义为 Go 结构体 + json tag"
  
  tools_list:
    - name: "search_fund"
      description: "按 keyword 模糊匹配基金 code/name，结果上限 20"
      user_isolation: "公共数据，无需 user_id"
      input_type: "SearchFundInput"
      fields:
        - name: "Keyword"
          type: "string"
          required: true
          description: "搜索关键词"

    - name: "market_quote"
      description: "按 symbol（如 sh000001）查实时行情快照"
      user_isolation: "需要 user_id（资产权属校验）"
      input_type: "MarketQuoteInput"
      fields:
        - name: "Symbol"
          type: "string"
          required: true
          description: "行情代码"

    - name: "market_data"
      description: "行情数据查询（含历史）"
      user_isolation: "需要 user_id"
      input_type: "MarketDataInput"
      fields:
        - name: "Symbol"
          type: "string"
          required: true
        - name: "StartDate"
          type: "string"
          required: false
        - name: "EndDate"
          type: "string"
          required: false

    - name: "holding_query"
      description: "查询当前持仓明细"
      user_isolation: "需要 user_id（强制 WHERE user_id=?）"
      input_type: "HoldingQueryInput"
      fields:
        - name: "Platform"
          type: "string"
          required: false
        - name: "AssetType"
          type: "string"
          required: false

    - name: "profit_calc"
      description: "计算盈亏数据"
      user_isolation: "需要 user_id"
      input_type: "ProfitCalcInput"
      fields:
        - name: "HoldingID"
          type: "uint"
          required: false

    - name: "platform_summary"
      description: "各平台资产汇总"
      user_isolation: "需要 user_id"
      input_type: "PlatformSummaryInput"
      fields:
        - name: "DisplayCurrency"
          type: "string"
          required: false
          default: "CNY"

    - name: "history_query"
      description: "查询历史交易记录"
      user_isolation: "需要 user_id"
      input_type: "HistoryQueryInput"
      fields:
        - name: "StartDate"
          type: "string"
          required: false
        - name: "EndDate"
          type: "string"
          required: false
        - name: "TxnType"
          type: "string"
          required: false

# ==============
# 12. 依赖注入规范
# ==============
dependency_injection:
  description: "依赖注入规范，定义在 internal/bootstrap/wire.go"
  
  principles:
    - "所有依赖在 internal/bootstrap/ 中通过显式组装（手动依赖注入）"
    - "第一阶段不使用 DI 框架"
    - "main.go 只负责加载配置 + 调 bootstrap.Wire(cfg) + 启动 HTTP 服务"
    - "替换任何组件只改 internal/bootstrap/ 这一处"
    - "未来升级到 Wire：把 bootstrap/wire.go 拆为多个 ProviderSet"
  
  assembly_order:
    - step: 1
      description: "初始化 DB（database/factory.go）"
    - step: 2
      description: "初始化 Cache（cache/factory.go）"
    - step: 3
      description: "创建 Repositories（repository/gorm/ 实现）"
    - step: 4
      description: "装配 AI 层（internal/llm/ 4 子包）"
    - step: 5
      description: "创建 Services（依赖 Repository / Cache / Runner 接口）"
    - step: 6
      description: "创建 Handlers（依赖 Services 接口）"
    - step: 7
      description: "注册路由（bootstrap/router.go）"

# ==============
# 13. 事务边界定义
# ==============
transaction_boundaries:
  description: "事务边界定义，确保数据一致性"
  
  boundaries:
    - name: "CreateTransaction"
      description: "创建交易 + 更新持仓"
      tables:
        - "t_fv_core_transactions"
        - "t_fv_core_holdings"
        - "t_fv_core_cost_lots（FIFO 时）"
      
    - name: "CashLink"
      description: "现金联动的两笔 Transaction"
      tables:
        - "t_fv_core_transactions（资产交易）"
        - "t_fv_core_transactions（现金交易）"
        - "t_fv_core_holdings（资产持仓）"
        - "t_fv_core_holdings（现金持仓）"
      
    - name: "MatureWealth"
      description: "理财到期自动处理"
      tables:
        - "t_fv_core_transactions"
        - "t_fv_core_holdings"
      
    - name: "RecalculateHolding"
      description: "按 Transaction 重新计算 Holding"
      tables:
        - "t_fv_core_holdings"
        - "t_fv_core_cost_lots"

# ==============
# 14. 错误处理规范
# ==============
error_handling:
  description: "错误处理规范，定义在 pkg/errs/ 包"
  
  principles:
    - "业务错误统一走 pkg/errs，未直接返回 errors.New(...)"
    - "错误链使用 fmt.Errorf(\"...: %w\", err) 包裹，未丢失底层 cause"
    - "handler 层将 *errs.AppError 映射到 HTTP 状态码与统一响应结构"
  
  error_codes:
    ranges:
      - range: "10000-19999"
        usage: "通用（参数、未授权、未找到）"
        examples:
          - code: 10001
            name: "InvalidParam"
          - code: 10404
            name: "NotFound"
      
      - range: "20000-29999"
        usage: "user / dict 模块"
      
      - range: "30000-39999"
        usage: "core 模块"
        examples:
          - code: 30001
            name: "AssetCodeDuplicated"
          - code: 30010
            name: "HoldingQuantityNotEnough"
      
      - range: "40000-49999"
        usage: "quote 模块"
      
      - range: "50000-59999"
        usage: "ai 模块"
        examples:
          - code: 50001
            name: "LLMProviderUnavailable"
      
      - range: "60000-69999"
        usage: "report 模块"
      
      - range: "90000-99999"
        usage: "系统级（DB / Cache / 第三方）"

# ==============
# 15. 命名规范摘要
# ==============
naming_conventions:
  description: "命名规范摘要，完整规范见 naming-conventions skill"
  
  database:
    table: "t_fv_{module}_{name}（全小写复数）"
    field: "f_" 前缀 + 全小写下划线"
    primary_key: "f_id（bigint unsigned）"
    foreign_key: "f_{表名}_id"
    unique_index: "uk_{字段简写}（不带模块前缀）"
    normal_index: "idx_{字段简写}"
  
  go_identifiers:
    package: "全小写、单数、无下划线（如 asset / holding）"
    interface: "XxxRepository / XxxService / XxxProvider"
    struct: "小写驼峰（包内私有，如 assetRepo）"
    constructor: "NewXxx 返回接口而非 struct"
    error_var: "Err 前缀 + 大驼峰（如 ErrAssetNotFound）"
    error_code: "ErrCodeXxx 大驼峰"
    enum: "Type 前缀大驼峰（如 TxnTypeBuy）"
  
  api_path:
    pattern: "/api/v{N}/{resource}（资源名全小写复数）"
    example: "GET /assets / GET /assets/:id"
