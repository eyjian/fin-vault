# fin-vault ai-rd-team 高级配置（Advanced 层）
#
# 关键作用：**显式覆盖**每个角色的 skills 列表，把框架默认的 Python 规范
# （python-best-practices / pytest-guide）替换为本项目的 Go 规范，避免
# 团队 prompt 同时注入两套语言规范造成行为漂移。
#
# 加载优先级（低层覆盖高层）：
#   defaults.yaml < ~/.ai-rd-team/config.yaml < .ai-rd-team/config.yaml
#     < .ai-rd-team/config.advanced.yaml  ← 本文件（最高优先）
#
# 数组字段（如 skills）是"低层完全替换高层"，不是"合并追加"——这正是我们需要的。
#
# Skill 引用语法 `<scope>:<name>` / `<name>`（不带 scope 时按 workspace>global>builtin 查找）。
# 我们项目级 skill 文件名不带 `fin-vault-` 前缀，scope 由 `.ai-rd-team/skills/` 路径自动判定。
#
# ⚠️ Skill 查找顺序：workspace > global > builtin（不带 scope 时按此顺序解析）。
# 我们引用的 `code-review-checklist` 当前会优先命中 workspace 占位
# `.ai-rd-team/skills/code-review-checklist.md`（2026-05-17 由 launcher 创建）。
# 待 ai-rd-team builtin 同名 skill 上线并验证后，可改为 `builtin:code-review-checklist`
# 并删除 workspace 占位文件。
#
# 见 docs/ai-rd-team-onboarding.md §6 + §7.2。

# Bridge 超时调高，避免 go-openai Tool Calling 多轮时被掐断
adapter:
  bridge_timeout_seconds: 300

# 角色 → Skills 映射（每角色 ≤ 3 个，遵守 ai-rd-team 注意力上限约束）
roles:
  # 架构师：定切分、定接口、定命名
  architect:
    skills:
      - "code-review-checklist"   # workspace 占位优先；builtin 就绪后切回 builtin:
      - "go-gin-development"
      - "naming-conventions"

  # 开发者：写代码的高频规范，Provider/error 由 reviewer 兜底
  developer:
    skills:
      - "go-gin-development"
      - "naming-conventions"
      - "decimal-precision"

  # 评审：兜底 dev 没注入的两个高阶约束
  reviewer:
    skills:
      - "code-review-checklist"   # workspace 占位优先；builtin 就绪后切回 builtin:
      - "error-handling"
      - "llm-provider-pattern"

  # 测试：了解分层结构 + 重点测金额计算
  tester:
    skills:
      - "go-gin-development"
      - "decimal-precision"

# 前端开发暂未启用（M1 只做后端）。M2 启动前端时，按下方注释解开：
#
# roles:
#   developer_frontend:        # 自定义角色实例
