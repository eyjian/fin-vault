# FinVault 后端配置（第一阶段：本地 SQLite + 单 LLM Provider）
server:
  host: "0.0.0.0"
  port: 2026
  read_timeout: 30s
  write_timeout: 30s
  mode: "debug"           # debug/release/test

database:
  driver: "sqlite"        # sqlite / mysql / postgres
  dsn: "data/finvault.db"
  auto_migrate: true
  log_level: "info"       # silent/error/warn/info
  max_idle_conns: 10
  max_open_conns: 50
  conn_max_lifetime: 1h

cache:
  driver: "memory"        # memory / redis
  redis:
    addr: "127.0.0.1:6379"
    password: ""
    db: 0

# 多 Provider LLM 配置（路由由 default 指定，可被请求参数覆盖）
llm:
  default: "deepseek"
  providers:
    deepseek:
      enabled: true
      api_key: "${DEEPSEEK_API_KEY:}"        # 从环境变量读取，不要提交真实 key 到仓库
      base_url: "https://api.deepseek.com"        # 官方推荐写法（OpenAI 兼容）
      # 可选 model：deepseek-v4-flash / deepseek-v4-pro / deepseek-chat / deepseek-reasoner
      model: "deepseek-v4-pro"
      timeout_sec: 60
    glm:
      enabled: false
      api_key: "${GLM_API_KEY:}"
      base_url: "https://open.bigmodel.cn/api/paas/v4"
      model: "glm-4-flash"
      timeout_sec: 60
    kimi:
      enabled: false
      api_key: "${KIMI_API_KEY:}"
      base_url: "https://api.moonshot.cn/v1"
      model: "moonshot-v1-8k"
      timeout_sec: 60
    qwen:
      enabled: false
      api_key: "${QWEN_API_KEY:}"
      base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
      model: "qwen-turbo"
      timeout_sec: 60
    ollama:
      enabled: false
      api_key: "${OLLAMA_API_KEY:}"        # 本地 ollama 可以留空
      base_url: "http://127.0.0.1:11434/v1"
      model: "qwen2.5:7b"
      timeout_sec: 120

# AI 会话与运行时（基于 trpc-agent-go）
ai:
  session:
    max_steps_size_mb: 100   # SQLite agent_steps 表估算上限（MB），0=不清理
    history_window: 20       # 单次推理拼接的历史消息条数上限

# 行情数据源
quote:
  refresh_interval: 5m
  http_timeout: 10s
  pool_size: 16

# 定时任务
cron:
  mature_scan: "30 0 * * *"   # 每天 00:30 扫描理财到期

# 日志
log:
  level: "info"           # debug/info/warn/error
  format: "text"          # text/json
  file: "logs/finvault.log"   # 日志文件路径，留空则只输出到 stdout
  max_size_mb: 50         # 单个日志文件最大体积（MB），超过即滚动
  max_backups: 10         # 最多保留旧日志文件数量
  max_age_days: 30        # 旧日志最长保留天数（0=不按天清理）
  compress: true          # 滚动后的旧日志是否 gzip 压缩
  console: true           # 是否同时输出到控制台

# JWT（第一阶段未启用认证，先占位）
jwt:
  secret: "${JWT_SECRET:fin-vault-secret-change-me}"
  expire: 168h
